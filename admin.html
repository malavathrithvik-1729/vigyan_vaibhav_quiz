<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATL Quiz – Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="admin.css">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- ================= ADMIN LOGIN ================= -->
<div class="admin-container" id="loginBox">
  <div class="admin-header">
    <h1>ATL Quiz – Admin Login</h1>
    <p>National Science Day Quiz</p>
  </div>

  <div style="text-align:center;">
    <input
      type="password"
      id="adminPassword"
      placeholder="Enter admin password"
      style="padding:12px;width:260px;font-size:1rem;border-radius:8px;border:1px solid #ccc;"
    />
    <br><br>
    <button class="primary-btn" onclick="checkAdmin()">Login</button>
  </div>
</div>

<!-- ================= ADMIN PANEL ================= -->
<div class="admin-container" id="adminPanel" style="display:none;">

  <div class="admin-header">
    <h1>ATL Innovation Quiz – Results</h1>
    <p>Conducted by School ATL</p>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>S.No</th>
          <th>Name</th>
          <th>Score</th>
          <th>Percentage</th>
          <th>Date & Time</th>
        </tr>
      </thead>
      <tbody id="resultsTable">
        <tr>
          <td colspan="5" style="text-align:center;">Loading results…</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="admin-footer">
    © School ATL – Educational Purpose Only
  </div>

</div>

<script>
/************************************************
 * ADMIN PASSWORD
 ************************************************/
const ADMIN_PASSWORD = "atl@science2025";

/************************************************
 * FIREBASE INIT
 ************************************************/
const firebaseConfig = {
  apiKey: "AIzaSyD0iMfVye_Mi-C8Cvaqm6p6YAzip29UGh0",
  authDomain: "atl-quiz-41936.firebaseapp.com",
  projectId: "atl-quiz-41936",
  storageBucket: "atl-quiz-41936.firebasestorage.app",
  messagingSenderId: "597852932899",
  appId: "1:597852932899:web:9dad49c19e65d8bd259a96"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

/************************************************
 * ADMIN LOGIN CHECK
 ************************************************/
function checkAdmin() {
  const input = document.getElementById("adminPassword").value;

  if (input === ADMIN_PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadResults();
  } else {
    alert("Wrong password");
  }
}

/************************************************
 * LOAD RESULTS (SAFE VERSION)
 ************************************************/
function loadResults() {
  const table = document.getElementById("resultsTable");
  let count = 1;

  db.collection("atl_results")
    .get()
    .then(snapshot => {
      table.innerHTML = "";

      if (snapshot.empty) {
        table.innerHTML = `
          <tr>
            <td colspan="5" style="text-align:center;">
              No results found
            </td>
          </tr>`;
        return;
      }

      // Convert to array and sort safely
      const docs = snapshot.docs
        .map(d => d.data())
        .sort((a, b) => {
          if (!a.createdAt) return 1;
          if (!b.createdAt) return -1;
          return b.createdAt.seconds - a.createdAt.seconds;
        });

      docs.forEach(d => {
        const dateText = d.createdAt
          ? d.createdAt.toDate().toLocaleString()
          : "—";

        const percentage = d.percentage !== undefined
          ? d.percentage + "%"
          : "—";

        table.innerHTML += `
          <tr>
            <td>${count++}</td>
            <td>${d.name || "—"}</td>
            <td class="score">${d.score} / ${d.total}</td>
            <td>${percentage}</td>
            <td>${dateText}</td>
          </tr>`;
      });
    })
    .catch(error => {
      console.error("Admin Firestore error:", error);
      table.innerHTML = `
        <tr>
          <td colspan="5" style="text-align:center;color:red;">
            Failed to load results
          </td>
        </tr>`;
    });
}
</script>

</body>
</html>

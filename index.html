<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATL Innovation Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- MAIN CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- 🔥 FIREBASE SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- 🔥 FIREBASE INIT -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0iMfVye_Mi-C8Cvaqm6p6YAzip29UGh0",
      authDomain: "atl-quiz-41936.firebaseapp.com",
      projectId: "atl-quiz-41936",
      storageBucket: "atl-quiz-41936.firebasestorage.app",
      messagingSenderId: "597852932899",
      appId: "1:597852932899:web:9dad49c19e65d8bd259a96"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    window.db = firebase.firestore();
  </script>

  <!-- 🌐 GOOGLE TRANSLATE -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'en', includedLanguages: 'en,te' },
        'google_translate_element'
      );
    }
  </script>

  <!-- SPLASH VISUAL ONLY -->
  <style>
    .intro-screen { background: #ffffff; }

    .intro-wrapper {
      text-align: center;
      animation: splashFade 1.2s ease;
    }

    .intro-logo {
      width: 140px;
      margin-bottom: 18px;
    }

    .intro-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #1f3c88;
      margin-bottom: 8px;
    }

    .intro-text {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
    }

    .intro-text span {
      display: block;
      margin-top: 6px;
      font-weight: 500;
      color: #333;
    }

    @keyframes splashFade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<!-- ================= SPLASH SCREEN ================= -->
<div id="introScreen" class="intro-screen">
  <div class="intro-wrapper">
    <img src="atl_logo.png" class="intro-logo" alt="ATL Logo">
    <div class="intro-title">Happy National Science Day 🔬</div>
    <p class="intro-text">
      Celebrating Curiosity, Innovation & Scientific Thinking
      <span>Conducted by School ATL</span>
    </p>
  </div>
</div>

<!-- ================= START SCREEN ================= -->
<div id="startScreen" class="screen hidden">
  <img src="spr_logo.png" class="corner-logo">

  <div class="quiz-card">
    <div style="text-align:right;margin-bottom:10px;">
      <div id="google_translate_element"></div>
    </div>

    <h1>ATL Innovation Quiz</h1>
    <p>Think • Design • Innovate</p>
    <p>Attempt a short quiz of 5 questions</p>

    <input
      type="text"
      id="usernameInput"
      placeholder="Enter your name"
      class="name-input"
    />

    <button class="primary-btn" onclick="startQuiz()">Start Quiz</button>
  </div>
</div>

<!-- ================= QUIZ SCREEN ================= -->
<div id="quizScreen" class="screen hidden">
  <img src="spr_logo.png" class="corner-logo">

  <div class="question-nav" id="questionNav" translate="no"></div>

  <div class="nav-legend" translate="no">
    <span style="color:#1e3a8a;">●</span> Current &nbsp;
    <span style="color:#16a34a;">●</span> Answered &nbsp;
    <span style="color:#facc15;">●</span> Visited
  </div>

  <div class="quiz-card">
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="top-bar" translate="no">
      <span>Question</span>
      <span id="attempted">1</span> /
      <span id="totalQ">5</span>
    </div>

    <h2 id="question"></h2>

    <div id="options">
      <button class="option-btn" data-option="1" onclick="selectOption(1,this)">A. <span id="o1"></span></button>
      <button class="option-btn" data-option="2" onclick="selectOption(2,this)">B. <span id="o2"></span></button>
      <button class="option-btn" data-option="3" onclick="selectOption(3,this)">C. <span id="o3"></span></button>
      <button class="option-btn" data-option="0" onclick="selectOption(0,this)">D. <span>None of the above</span></button>
    </div>

    <div style="display:flex;justify-content:space-between;margin-top:20px">
      <button class="secondary-btn" onclick="goBack()">Back</button>
      <button class="primary-btn" onclick="nextQuestion()">Next</button>
    </div>
  </div>
</div>

<!-- ================= RESULT SCREEN ================= -->
<div id="resultScreen" class="screen hidden">
  <div class="quiz-card" style="max-height:90vh;display:flex;flex-direction:column;">

    <div class="score-ring-wrapper">
      <svg class="score-ring" width="180" height="180">
        <circle class="ring-bg" cx="90" cy="90" r="80"></circle>
        <circle class="ring-progress" cx="90" cy="90" r="80"></circle>
      </svg>
      <div class="score-ring-text">
        <span id="ringScore">0</span><small>%</small>
      </div>
    </div>

    <h3 id="finalScore"></h3>

    <button
      class="secondary-btn"
      id="toggleReviewBtn"
      onclick="toggleReview()">
      Show Answer Review
    </button>

    <div id="reviewWrapper" style="display:none;flex:1;overflow-y:auto;margin-top:15px;">
      <h4>Answer Review</h4>
      <div id="reviewSection"></div>
    </div>

    <button class="primary-btn" onclick="location.reload()">Restart Quiz</button>
  </div>
</div>

<script src="script.js"></script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
  setTimeout(() => {
    document.getElementById("introScreen").style.display = "none";
    document.getElementById("startScreen").classList.remove("hidden");
  }, 2000);
</script>

</body>
</html>
